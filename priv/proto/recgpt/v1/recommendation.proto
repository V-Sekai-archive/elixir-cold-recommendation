syntax = "proto3";

package recgpt.v1;

// =============================================================================
// Authoritative API contract. Service is gRPC-only (no REST server).
// =============================================================================
//
// gRPC: recgpt.v1.PredictionService.Predict (PredictRequest → PredictResponse).
//   Request: context_item_ids (required, non-empty), max_results (optional, default 5, max 20).
//   Response: item_ids (ordered recommended IDs), items (ItemSummary: item_id, display_name).
//
// Errors (gRPC status): INVALID_ARGUMENT (bad params), UNAVAILABLE (not ready).
//
// SPMD compatibility: Optional "rank" allows multi-rank deployments (one server
// per rank, or routing by rank). Single-rank implementations ignore rank.
//
// Server: mix recgpt.serve --grpc-port 50051 (fixture + checkpoint export dir required).

service PredictionService {
  rpc Predict (PredictRequest) returns (PredictResponse);
}

message PredictRequest {
  repeated int32 context_item_ids = 1;
  int32 max_results = 2;
  optional int32 rank = 3;  // SPMD: route to / scope by rank (0-based); ignored if unset
}

message PredictResponse {
  repeated int32 item_ids = 1;
  repeated ItemSummary items = 2;
}

message ItemSummary {
  int32 item_id = 1;
  string display_name = 2;
}
