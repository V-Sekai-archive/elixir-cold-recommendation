# CI: runs the QA checklist from docs/features/23_quality_assurance.md (steps 1–6).
# Steps 1–5: compile, format, Credo, unit tests, Dialyzer.
# Step 6: pipeline (export_fuxi_ckpt, fetch_steam, build_fixture); pretrain commented out for CI; use FuXi init for eval.
# Uses Steam test data (hkuds/RecGPT_dataset) and FuXi-Linear init.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  MIX_ENV: test

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18.4"

      - name: Restore dependency cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            priv/plts
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix local.hex --force && mix local.rebar --force && mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Format
        run: mix format --check-formatted

      - name: Credo
        run: mix credo

      - name: Unit tests
        run: mix test --no-start --exclude integration --exclude eval

      - name: Dialyzer
        run: mix dialyzer --format short

      - name: Prepare data directory
        run: mkdir -p data

      - name: Restore checkpoint cache
        id: restore_ckpt
        uses: actions/cache@v4
        with:
          path: data/fuxi_ckpt_export
          key: ${{ runner.os }}-fuxi-ckpt-v1
          restore-keys: |
            ${{ runner.os }}-fuxi-ckpt-

      - name: Export FuXi-Linear checkpoint
        run: |
          if [ ! -f data/fuxi_ckpt_export/manifest.json ]; then
            mix recgpt.export_fuxi_ckpt --out data/fuxi_ckpt_export
          fi

      - name: Restore Steam data cache
        id: restore_steam
        uses: actions/cache@v4
        with:
          path: data/steam
          key: ${{ runner.os }}-steam-v1
          restore-keys: |
            ${{ runner.os }}-steam-

      - name: Fetch Steam dataset
        run: |
          if [ ! -f data/steam/items.json ]; then
            mix recgpt.fetch_steam data/steam
          fi

      - name: Build fixture
        run: mix recgpt.build_fixture --items data/steam/items.json --out data/steam/fixture.json --ckpt data/fuxi_ckpt_export

      - name: Zero-shot eval
        run: |
          mix recgpt.eval \
            --fixture data/steam/fixture.json \
            --ckpt data/fuxi_ckpt_export \
            --test data/steam/test_sequences.json \
            --cold-test data/steam/cold_test_sequences.json

      # Pretrain skipped in CI; uncomment and use data/ckpt_after_pretrain in Trained eval + Steam top-k for local testing.
      # - name: Pretrain (short run for CI)
      #   run: |
      #     mix recgpt.pretrain \
      #       --ckpt data/fuxi_ckpt_export \
      #       --fixture data/steam/fixture.json \
      #       --train data/steam/train_sequences.json \
      #       --items data/steam/items.json \
      #       --out data/ckpt_after_pretrain \
      #       --iterations 30 \
      #       --batch-size 8 \
      #       --log 10

      - name: Trained eval
        run: |
          mix recgpt.eval \
            --fixture data/steam/fixture.json \
            --ckpt data/fuxi_ckpt_export \
            --test data/steam/test_sequences.json \
            --cold-test data/steam/cold_test_sequences.json

      - name: Steam top-k (reject null; pretrained >= zero-shot)
        env:
          RECGPT_FIXTURE: data/steam/fixture.json
          RECGPT_CKPT_ZEROSHOT: data/fuxi_ckpt_export
          RECGPT_CKPT_EXPORT: data/fuxi_ckpt_export
          RECGPT_TEST_SEQUENCES: data/steam/test_sequences.json
        run: mix test test/recgpt/eval_test.exs --include eval --include integration --no-start

      - name: Save checkpoint cache
        uses: actions/cache/save@v4
        if: steps.restore_ckpt.outputs.cache-hit != 'true'
        with:
          path: data/fuxi_ckpt_export
          key: ${{ runner.os }}-fuxi-ckpt-v1

      - name: Save Steam cache
        uses: actions/cache/save@v4
        if: steps.restore_steam.outputs.cache-hit != 'true'
        with:
          path: data/steam
          key: ${{ runner.os }}-steam-v1
